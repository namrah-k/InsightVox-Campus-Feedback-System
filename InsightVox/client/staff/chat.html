<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages · InsightVox</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
  <link rel="stylesheet" href="/shared/style.css" />
  <script src="/shared/theme.js"></script>
</head>
<body>
  <header class="header" id="app-header"></header>

  <main class="page-wrap" style="max-width: 1100px;">
    <h1 class="page-title">Messages</h1>
    <p class="page-subtitle">Reply to students privately about their complaints.</p>

    <div class="chat-shell">
      <div class="conversation-list" id="conversation-list">
        <p class="loading-text">Loading conversations...</p>
      </div>

      <div class="chat-panel">
        <div class="chat-header-bar" id="chat-header-bar">Select a conversation</div>
        <div class="chat-messages" id="chat-messages">
          <p class="page-subtitle" style="text-align:center;">Choose a student from the list to view messages.</p>
        </div>
        <form class="chat-input-form hidden" id="chat-form">
          <label for="image-upload" class="camera-icon" title="Attach image">📷</label>
          <input type="file" id="image-upload" accept="image/*" style="display: none;" />
          <textarea id="chat-input" placeholder="Type your reply..." rows="1"></textarea>
          <button type="submit" class="btn btn-primary send-button">Send</button>
        </form>
      </div>
    </div>
  </main>

  <script src="/shared/api.js"></script>
  <script src="/shared/nav.js"></script>
  <script src="/shared/chat-ui.js"></script>
  <script>
    window.IV_ACTIVE_PAGE = 'chat';
    const currentUser = requireRole('staff');
  </script>
  <script src="chat.js"></script>
</body>
</html>
