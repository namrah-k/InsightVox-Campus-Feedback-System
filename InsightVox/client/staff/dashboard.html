<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Complaints Dashboard · InsightVox</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
  <link rel="stylesheet" href="/shared/style.css" />
  <script src="/shared/theme.js"></script>
</head>
<body>
  <header class="header" id="app-header"></header>

  <main class="page-wrap">
    <h1 class="page-title">Complaints Dashboard</h1>
    <p class="page-subtitle">Review, respond to, and track the status of student complaints.</p>

    <div class="toolbar">
      <div class="tabs">
        <button id="tab-trending" class="active">Trending</button>
        <button id="tab-recent">Recent</button>
      </div>
      <select id="status-filter" class="filter-select">
        <option value="">All statuses</option>
        <option value="pending">Pending</option>
        <option value="in-progress">In Progress</option>
        <option value="resolved">Resolved</option>
      </select>
    </div>

    <div id="posts-list" class="posts-list">
      <p class="loading-text">Loading posts...</p>
    </div>
  </main>

  <script src="/shared/api.js"></script>
  <script src="/shared/nav.js"></script>
  <script src="/shared/posts-ui.js"></script>
  <script>
    window.IV_ACTIVE_PAGE = 'dashboard';
    const currentUser = requireRole('staff');
  </script>
  <script src="dashboard.js"></script>
</body>
</html>
